services:
  backend:
    build: ./backend
    command: gunicorn blogify.wsgi:application --bind 0.0.0.0:8000 --workers 3 --chdir /app/blogify
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - db
      - redis
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/admin/', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: always

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: always

  db:
    image: postgres:13
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-blogify}
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgress123@@}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-blogify}"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: always

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: always

  celery:
    build: ./backend
    command: sh -c "chmod +x run_celery.sh && ./run_celery.sh"
    depends_on:
      - redis
      - backend
    env_file:
      - ./backend/.env
    restart: always

  celery-beat:
    build: ./backend
    command: sh -c "chmod +x run_celery.sh && ./run_celery.sh beat"
    depends_on:
      - redis
      - backend
    env_file:
      - ./backend/.env
    restart: always

volumes:
  postgres_data:
